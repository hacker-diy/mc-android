name: Build MC APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p build/outputs/mc-apk
          cp app/build/outputs/apk/debug/app-debug.apk build/outputs/mc-apk/MC_Magic_Control_debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC_Magic_Control_debug_APK
          path: build/outputs/mc-apk/MC_Magic_Control_debug.apk
