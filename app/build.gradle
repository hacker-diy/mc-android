plugins {
    id 'com.android.application'
}

android {
    namespace 'com.magiccontrol.mc'
    compileSdk 35

    defaultConfig {
        applicationId 'com.magiccontrol.mc'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            debuggable false
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
